version: 2

updates:
    - package-ecosystem: npm
      directory: /
      schedule:
          interval: weekly
          day: monday
      groups:
          stryker:
              patterns:
                  - "@stryker-mutator/*"
          vitest:
              patterns:
                  - "vitest"
                  - "@vitest/*"
      open-pull-requests-limit: 10

    - package-ecosystem: github-actions
      directory: /
      schedule:
          interval: weekly
          day: monday
